<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>memory_system · 选段</title>
<style>
  :root { --bg:#1a1b1e; --panel:#232529; --line:#33363c; --fg:#dfe1e5;
          --muted:#8a8f98; --me:#7aa2f7; --claude:#9ece6a; --warn:#e0af68;
          --done:#565a63; --sel:#2d3f5e; }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.6 -apple-system,system-ui,"PingFang SC",sans-serif;
         background:var(--bg); color:var(--fg); height:100vh; display:flex; }
  #list { width:300px; flex:none; border-right:1px solid var(--line);
          overflow-y:auto; background:var(--panel); }
  #list h2, #main h2 { font-size:12px; text-transform:uppercase; letter-spacing:.5px;
          color:var(--muted); padding:12px 14px 6px; margin:0; position:sticky; top:0;
          background:var(--panel); }
  .t-item { padding:8px 14px; border-bottom:1px solid var(--line); cursor:pointer; }
  .t-item:hover { background:#2a2d33; }
  .t-item.active { background:var(--sel); }
  .t-item .sid { font-family:ui-monospace,monospace; color:var(--me); }
  .t-item .meta { color:var(--muted); font-size:12px; }
  .badge { display:inline-block; font-size:11px; padding:0 6px; border-radius:8px;
           background:var(--warn); color:#1a1b1e; margin-left:6px; }
  #main { flex:1; overflow-y:auto; padding-bottom:80px; }
  #main h2 { background:var(--bg); }
  #hint { color:var(--muted); padding:14px; }
  .list-note { color:var(--muted); font-size:11px; padding:6px 12px; font-style:italic; }
  .turn { margin:8px 14px; padding:10px 12px; border:1px solid var(--line);
          border-radius:8px; cursor:pointer; position:relative; }
  .turn:hover { border-color:var(--me); }
  .turn.sel { border-color:var(--me); background:var(--sel); }
  .turn.done { border-style:dashed; }
  .turn .who { font-weight:600; }
  .turn .me { color:var(--me); }
  .turn .claude { color:var(--claude); }
  .turn .txt { white-space:pre-wrap; margin:2px 0 8px; }
  .turn .tmeta { color:var(--muted); font-size:12px; }
  .turn .done-tag { color:var(--done); font-size:11px; position:absolute;
          top:8px; right:10px; }
  #bar { position:fixed; bottom:0; left:300px; right:0; background:var(--panel);
         border-top:1px solid var(--line); padding:10px 16px; display:flex;
         align-items:center; gap:14px; }
  #bar button { background:var(--me); color:#10131a; border:0; border-radius:6px;
         padding:8px 16px; font-size:14px; cursor:pointer; }
  #bar button:disabled { background:var(--done); cursor:default; }
  #bar .info { color:var(--muted); }
  #toast { position:fixed; top:14px; right:14px; background:var(--claude);
         color:#10131a; padding:8px 14px; border-radius:6px; opacity:0;
         transition:opacity .3s; }
  #toast.show { opacity:1; }
</style>
</head>
<body>
  <div id="list"><h2>Transcript</h2><div id="t-items"></div></div>
  <div id="main">
    <h2 id="main-title">选段</h2>
    <div id="hint">← 左侧选一个 transcript</div>
    <div id="turns"></div>
  </div>
  <div id="bar">
    <button id="mark" disabled>标记选段为已处理</button>
    <span class="info" id="sel-info">未选</span>
  </div>
  <div id="toast"></div>
  <script src="/app.js"></script>
</body>
</html>
